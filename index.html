<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menú Monumental</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/1.39.1/iconfont/tabler-icons.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap');

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#0a0a0a;
  font-family:'Barlow',sans-serif;
}

.menu-wrap{
  background:#0d0d0d;
  color:#f0f0f0;
  min-height:100vh;
  padding-bottom:3rem;
}

/* HEADER */

.header{
  background:#111;
  padding:1.2rem 1rem 1rem;
  text-align:center;
  border-bottom:2px solid #c8a84b;
  position:sticky;
  top:0;
  z-index:100;
}

.logo-area{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:16px;
}

.logo-img{
  width:92px;
  height:92px;
  object-fit:contain;
}

.bar-title{
  font-family:'Bebas Neue',cursive;
  font-size:2.3rem;
  color:#c8a84b;
  letter-spacing:3px;
  line-height:0.9;
}

.bar-title.small{
  font-size:1.8rem;
}

.bar-sub{
  font-size:0.75rem;
  letter-spacing:2px;
  color:#999;
  margin-top:5px;
}

/* SEARCH */

.search-wrap{
  padding:1rem;
  background:#111;
}

.search-container{
  position:relative;
}

.search-icon{
  position:absolute;
  left:1rem;
  top:50%;
  transform:translateY(-50%);
  color:#777;
  font-size:17px;
}

.search-box{
  width:100%;
  background:#1a1a1a;
  border:1px solid #333;
  border-radius:12px;
  padding:0.9rem 1rem 0.9rem 2.8rem;
  color:#f0f0f0;
  font-size:14px;
  outline:none;
}

.search-box::placeholder{
  color:#777;
}

/* CATEGORIES */

.cats{
  display:flex;
  gap:8px;
  padding:0 1rem 1rem;
  overflow-x:auto;
  scrollbar-width:none;
  background:#111;
}

.cats::-webkit-scrollbar{
  display:none;
}

.cat-btn{
  flex-shrink:0;
  padding:8px 14px;
  border-radius:30px;
  border:1px solid #333;
  background:#1a1a1a;
  color:#aaa;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
  white-space:nowrap;
}

.cat-btn.active{
  background:#c8a84b;
  border-color:#c8a84b;
  color:#0d0d0d;
}

/* SECTIONS */

.section{
  padding:0 1rem;
  margin-top:1.4rem;
}

.section-title{
  font-family:'Bebas Neue',cursive;
  font-size:1.5rem;
  color:#c8a84b;
  letter-spacing:2px;
  margin-bottom:0.8rem;
  padding-bottom:0.5rem;
  border-bottom:1px solid #2a2a2a;
  display:flex;
  align-items:center;
  gap:10px;
}

/* ITEMS */

.item{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:12px;
  padding:12px 0;
  border-bottom:1px solid #1f1f1f;
}

.item:last-child{
  border-bottom:none;
}

.item-name{
  font-size:14px;
  font-weight:600;
  color:#f1f1f1;
}

.item-desc{
  font-size:11px;
  color:#8d8d8d;
  margin-top:4px;
  line-height:1.4;
}

.item-price{
  font-family:'Bebas Neue',cursive;
  font-size:1.2rem;
  color:#c8a84b;
  letter-spacing:1px;
  white-space:nowrap;
}

/* BADGES */

.badge{
  display:inline-block;
  font-size:9px;
  background:#c8a84b22;
  color:#c8a84b;
  border:1px solid #c8a84b55;
  padding:2px 7px;
  border-radius:20px;
  margin-left:6px;
  font-weight:700;
  letter-spacing:0.5px;
  vertical-align:middle;
}

/* EMPTY */

.empty{
  text-align:center;
  color:#666;
  padding:3rem 1rem;
  font-size:14px;
}

/* MOBILE */

@media (max-width:768px){

  .logo-img{
    width:82px;
    height:82px;
  }

  .bar-title{
    font-size:2rem;
  }

  .bar-title.small{
    font-size:1.6rem;
  }

  .item-name{
    font-size:15px;
  }

  .item-price{
    font-size:1.3rem;
  }

}
</style>
</head>

<body>

<div class="menu-wrap">

  <!-- HEADER -->

  <div class="header">

    <div class="logo-area">

      <!-- TU LOGO -->
      <img
        src="logo.png"
        alt="Logo"
        class="logo-img"
      >

      <div>
        <div class="bar-title">Menú</div>
        <div class="bar-title small">Monumental</div>
        <div class="bar-sub">FÚTBOL · CERVEZA · AMIGOS</div>
      </div>

    </div>

  </div>

  <!-- SEARCH -->

  <div class="search-wrap">

    <div class="search-container">

      <i class="ti ti-search search-icon"></i>

      <input
        class="search-box"
        type="text"
        id="search"
        placeholder="Buscar bebida..."
        oninput="filterItems()"
      >

    </div>

  </div>

  <!-- CATEGORIES -->

  <div class="cats">

    <button class="cat-btn active" onclick="setCategory('todas',this)">⚽ Todas</button>

    <button class="cat-btn" onclick="setCategory('cervezas',this)">🍺 Cervezas</button>

    <button class="cat-btn" onclick="setCategory('guaro',this)">🥃 Guaro</button>

    <button class="cat-btn" onclick="setCategory('titular',this)">🏆 La Titular</button>

    <button class="cat-btn" onclick="setCategory('casa',this)">🍹 De la Casa</button>

    <button class="cat-btn" onclick="setCategory('shots',this)">🔥 Shots</button>

    <button class="cat-btn" onclick="setCategory('sin',this)">🥤 Sin Alcohol</button>

  </div>

</div>

<script>

let activeCategory = 'todas';

function setCategory(cat, btn){

  activeCategory = cat;

  document.querySelectorAll('.cat-btn')
    .forEach(b => b.classList.remove('active'));

  btn.classList.add('active');
}

</script>

</body>
</html>
